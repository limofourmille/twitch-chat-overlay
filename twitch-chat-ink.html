<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Twitch Chat — Ink Overlay</title>
<style>
  /* ============================================================
     CONFIG RAPIDE — modifie ces valeurs et c'est prêt
     ============================================================ */
  :root{
    --ink-black:      #16110d;
    --ink-indigo:     #262038;
    --ink-wash:       rgba(38,32,56,0.55);
    --ink-crimson:    #8c2f39;
    --ink-gold:       #c9a15a;
    --paper:          #f2ead9;
    --text-size:      21px;
    --message-gap:    10px;
    --max-width:      560px;
  }
</style>
</head>
<body>

<!-- ===============================================================
  TWITCH CHAT INK OVERLAY
  ===============================================================
  Utilisation dans OBS :
  1. Ajoute une "Source de navigateur" (Browser Source)
  2. Fichier local -> pointe vers ce .html (ou héberge-le et mets l'URL)
  3. Largeur ~600, Hauteur ~800 (ajuste selon ta mise en page)
  4. Coche "Actualiser le navigateur quand la scène devient active"
  5. Le fond est transparent nativement, rien à cocher côté OBS

  CONFIG :
  - CHANNEL : ton pseudo Twitch (login, tout en minuscules)
  - CHANNEL_ID : ton ID numérique Twitch (optionnel, pour les badges
    sub/bits propres à TA chaîne plutôt que les badges génériques).
    Tu peux le trouver sur https://streamweasels.com/tools/convert-twitch-username-to-user-id/
  =============================================================== -->

<div id="chat-root"></div>

<style>
  html,body{
    margin:0; padding:0;
    background:transparent;
    width:100%; height:100%;
    overflow:hidden;
    font-family:'Inter', 'Segoe UI', sans-serif;
  }

  #chat-root{
    position:absolute;
    bottom:24px;
    left:24px;
    right:24px;
    width:auto;
    display:flex;
    flex-direction:column-reverse; /* nouveaux messages poussent vers le haut */
    align-items:stretch;
    gap:12px;
    max-height:92vh;
  }

  .msg{
    position:relative;
    max-width:74%;
    padding:6px 4px;
    margin:10px 0;
  }
  .msg.side-left{ align-self:flex-start; }
  .msg.side-right{ align-self:flex-end; }

  .msg-body{ min-width:0; display:flex; flex-direction:column; align-items:flex-start; gap:0; }

  /* ---- Chaque ligne (pseudo, texte) est un trait de pinceau independant ---- */
  .line-wrap{
    position:relative;
    display:inline-block;
    padding:6px 14px;
  }
  .name-line{ margin-bottom:-10px; z-index:1; }

  /* Avatar fixe par utilisateur, perche au-dessus du debut du pseudo :
     sa moitie haute depasse librement au-dessus de la ligne, sa moitie
     basse plonge derriere la brush du pseudo (z-index < .brush). C'est un
     conteneur : soit un avatar fixe (fallback), soit un empilement de
     pieces modulaires venant de Supabase (voir resolveAvatar). */
  .avatar{
    position:absolute;
    left:-10px;
    top:-55px;
    width:102px;
    height:102px;
    z-index:-1;
    pointer-events:none;
    opacity:0;
    transition:opacity 0.25s ease;
  }
  .avatar.avatar-ready{ opacity:1; }

  .msg.leaving .brush,
  .msg.leaving .avatar{
    transition: opacity 0.6s ease;
    opacity:0;
  }
  .msg.leaving .username,
  .msg.leaving .text{
    animation: text-fade-out 0.6s ease forwards;
  }
  @keyframes text-fade-out{
    from{
      -webkit-mask-image: linear-gradient(90deg, transparent 0%, black 0%);
              mask-image: linear-gradient(90deg, transparent 0%, black 0%);
    }
    to{
      -webkit-mask-image: linear-gradient(90deg, transparent 100%, black 100%);
              mask-image: linear-gradient(90deg, transparent 100%, black 100%);
    }
  }

  /* Le clip-path (et donc le contexte d'empilement qu'il cree) reste
     confine a la brush elle-meme : le texte n'est jamais isole dans
     un contexte separe, il reste toujours compare au niveau du .msg */
  .brush{
    position:absolute;
    inset:-8px -14px;
    z-index:0;
    background-size:100% 100%;
    background-repeat:no-repeat;
    background-position:center;
    clip-path: inset(-10px calc(100% + 16px) -10px -16px);
    animation: paint-reveal 0.55s steps(16,end) both;
  }
  .name-line .brush{ animation-delay:0s; }
  .text-line .brush{ animation-delay:0.3s; filter:contrast(0.75) brightness(1.15); }

  @keyframes paint-reveal{
    to{ clip-path: inset(-10px -16px -10px -16px); }
  }

  .msg-content, .text{
    opacity:0;
    animation: content-in 0.3s ease-out both;
  }
  .msg-content{ animation-delay:0.15s; }
  .text{ animation-delay:0.45s; }
  @keyframes content-in{ to{ opacity:1; } }

  /* ---- Le contenu (badges + texte), par-dessus le trait ---- */
  .msg-content{
    position:relative;
    z-index:2;
    display:flex;
    align-items:center;
    gap:6px;
  }

  .badges{
    display:flex;
    gap:3px;
    flex-shrink:0;
  }
  .badges img{
    width:16px; height:16px;
    display:block;
  }

  .username{
    font-family:'Segoe Print', 'Bradley Hand', 'Chalkboard SE', 'Comic Sans MS', cursive;
    font-weight:700;
    font-size:calc(var(--text-size) + 2px);
    letter-spacing:0.3px;
    color:white;
    /* Contour simule avec des text-shadow decalees plutot que
       -webkit-text-stroke/paint-order : ces deux proprietes ne sont
       pas fiables sur toutes les versions de Chromium (le CEF embarque
       par OBS peut etre bien plus vieux que le navigateur de bureau),
       et le contour se met alors a "manger" le remplissage blanc. */
    text-shadow:
      -2px -2px 0 black,  2px -2px 0 black,
      -2px  2px 0 black,  2px  2px 0 black,
      -2px  0   0 black,  2px  0   0 black,
       0   -2px 0 black,  0    2px 0 black,
       0 0 6px black;
  }

  .text{
    color:white;
    font-family:'Segoe Print', 'Bradley Hand', 'Chalkboard SE', 'Comic Sans MS', cursive;
    font-size:calc(var(--text-size) + 2px);
    line-height:1.4;
    word-break:break-word;
    position:relative;
    z-index:2;
    text-shadow:
      -2px -2px 0 black,  2px -2px 0 black,
      -2px  2px 0 black,  2px  2px 0 black,
      -2px  0   0 black,  2px  0   0 black,
       0   -2px 0 black,  0    2px 0 black,
       0 0 6px black;
  }

  .emote{
    height:1.6em;
    vertical-align:middle;
    margin:-2px 1px;
  }

  .avatar img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain;
  }
</style>

<script src="assets/parts-manifest.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(function(){

  /* ====================== CONFIG ====================== */
  const CONFIG = {
    CHANNEL: "LimoFourmille",
    CHANNEL_ID: "1478240165",
    MAX_MESSAGES: 12,                 // plafond max, la purge reelle se fait par hauteur (voir addMessage)
    MESSAGE_LIFETIME_MS: 18000,       // 0 = les messages restent indefiniment
    SHOW_BADGES: true,
    SHOW_EMOTES: true,
    DEBUG: false,                      // passe a true pour reafficher le message de test + logs console
    SUPABASE_URL: 'https://nvqddjwfzuusvmfwilyh.supabase.co',       // meme projet Supabase que avatar-editor.html
    SUPABASE_ANON_KEY: 'sb_publishable_z9m2o_qjOP5Evrn_sR8uOw_vgeSIywz',
  };
  /* ====================================================== */

  const sb = (CONFIG.SUPABASE_URL !== 'REMPLACE_MOI' && window.supabase)
    ? window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY)
    : null;

  const root = document.getElementById('chat-root');
  let badgeMap = {}; // "badge-set/version" -> image url
  let messageIndex = 0;

  async function loadBadges(){
    try{
      const g = await fetch('https://badges.twitch.tv/v1/badges/global/display').then(r=>r.json());
      Object.entries(g.badge_sets).forEach(([setId, data])=>{
        Object.entries(data.versions).forEach(([ver, v])=>{
          badgeMap[setId+'/'+ver] = v.image_url_2x || v.image_url_1x;
        });
      });
    }catch(e){ console.warn('Badges globaux indisponibles', e); }


    if(CONFIG.CHANNEL_ID){
      try{
        const c = await fetch('https://badges.twitch.tv/v1/badges/channels/'+CONFIG.CHANNEL_ID+'/display').then(r=>r.json());
        Object.entries(c.badge_sets).forEach(([setId, data])=>{
          Object.entries(data.versions).forEach(([ver, v])=>{
            badgeMap[setId+'/'+ver] = v.image_url_2x || v.image_url_1x; // ecrase les globaux (sub badges propres a la chaine)
          });
        });
      }catch(e){ console.warn('Badges de chaine indisponibles (CHANNEL_ID correct ?)', e); }
    }
  }

  function renderBadges(tags){
    if(!CONFIG.SHOW_BADGES || !tags.badges) return '';
    let html = '<div class="badges">';
    Object.entries(tags.badges).forEach(([setId, ver])=>{
      const url = badgeMap[setId+'/'+ver];
      if(url) html += `<img src="${url}" alt="${setId}" title="${setId}">`;
    });
    html += '</div>';
    return html;
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.innerText = str;
    return d.innerHTML;
  }

  function renderMessageText(message, tags){
    let text = escapeHtml(message);

    if(CONFIG.SHOW_EMOTES && tags.emotes){
      // On travaille sur la version brute pour respecter les offsets Twitch,
      // donc on reconstruit depuis message (pas depuis le texte deja echappe)
      const chars = Array.from(message);
      const ranges = [];
      Object.entries(tags.emotes).forEach(([emoteId, positions])=>{
        positions.forEach(pos=>{
          const [start,end] = pos.split('-').map(Number);
          ranges.push({start, end, emoteId});
        });
      });
      ranges.sort((a,b)=>a.start-b.start);

      let out = '';
      let cursor = 0;
      ranges.forEach(r=>{
        out += escapeHtml(chars.slice(cursor, r.start).join(''));
        const url = `https://static-cdn.jtvnw.net/emoticons/v2/${r.emoteId}/default/dark/2.0`;
        out += `<img class="emote" src="${url}" alt="">`;
        cursor = r.end+1;
      });
      out += escapeHtml(chars.slice(cursor).join(''));
      text = out;
    }
    return text;
  }

  const BRUSH_IMAGES = [
    'assets/brush-01.png','assets/brush-02.png','assets/brush-03.png','assets/brush-04.png','assets/brush-05.png',
    'assets/brush-06.png','assets/brush-07.png','assets/brush-08.png','assets/brush-09.png','assets/brush-10.png'
  ];
  function randomBrushImage(){ return BRUSH_IMAGES[Math.floor(Math.random() * BRUSH_IMAGES.length)]; }

  const AVATAR_IMAGES = [
    'assets/avatar-01.png','assets/avatar-02.png','assets/avatar-03.png','assets/avatar-04.png'
  ];
  // Meme utilisateur = toujours le meme avatar (hash du login, stable
  // contrairement au display-name qui peut varier en casse/unicode).
  function pickAvatar(username){
    let hash = 0;
    for(let i = 0; i < username.length; i++){
      hash = (hash * 31 + username.charCodeAt(i)) | 0;
    }
    return AVATAR_IMAGES[Math.abs(hash) % AVATAR_IMAGES.length];
  }

  // Va chercher l'avatar modulaire personnalise via avatar-editor.html.
  // Interroge Supabase a chaque message (pas de cache) : un chat genere
  // bien trop peu de lectures pour que ca compte, et mettre en cache
  // empechait un changement d'avatar en cours de stream d'etre jamais pris
  // en compte tant qu'OBS n'etait pas relance. Si Supabase n'est pas
  // configure ou que le viewer n'a rien personnalise, on garde simplement
  // l'avatar fixe (fallback) deja affiche par pickAvatar.
  function fetchAvatarConfig(username){
    if(!sb) return Promise.resolve(null);
    return sb
      .from('avatar_customizations')
      .select('*')
      .eq('twitch_login', username)
      .maybeSingle()
      .then(({ data, error }) => {
        if(error){ console.error('[chat-overlay] avatar personnalise:', error); return null; }
        return data || null;
      })
      .catch(err => { console.error('[chat-overlay] avatar personnalise:', err); return null; });
  }

  // Le conteneur .avatar demarre vide (voir addMessage) : on attend de
  // savoir s'il y a une config Supabase avant d'afficher quoi que ce soit,
  // pour ne jamais montrer le fallback puis le remplacer par le
  // personnalise une fraction de seconde plus tard.
  async function resolveAvatar(username, containerEl){
    const cfg = await fetchAvatarConfig(username);
    if(!containerEl.isConnected) return;
    const manifest = window.AVATAR_PARTS_MANIFEST;
    if(cfg){
      manifest.renderOrder.forEach(cat => {
        const idx = cfg[cat];
        if(!idx) return;
        const img = document.createElement('img');
        img.src = manifest.partPath(cat, idx);
        containerEl.appendChild(img);
      });
    } else {
      const img = document.createElement('img');
      img.src = pickAvatar(username);
      containerEl.appendChild(img);
    }
    containerEl.classList.add('avatar-ready');
  }

  const BRUSH_PAD_X = 14, BRUSH_PAD_Y = 8;

  // Zone reellement encree (non transparente) de chaque PNG, mesuree une fois
  // sur les fichiers sources (le canvas de chaque brush a des marges vides
  // de tailles differentes). Sert a recadrer le background pour que l'encre -
  // et non le canvas entier - remplisse exactement la boite du texte.
  const BRUSH_INK_BOUNDS = {
    'assets/brush-01.png': {x0:0.034, x1:0.935, y0:0.033, y1:0.910},
    'assets/brush-02.png': {x0:0.024, x1:0.952, y0:0.057, y1:0.932},
    'assets/brush-03.png': {x0:0.015, x1:0.888, y0:0.073, y1:0.921},
    'assets/brush-04.png': {x0:0.045, x1:0.952, y0:0.075, y1:0.951},
    'assets/brush-05.png': {x0:0.011, x1:0.972, y0:0.087, y1:0.937},
    'assets/brush-06.png': {x0:0.013, x1:0.929, y0:0.056, y1:0.888},
    'assets/brush-07.png': {x0:0.014, x1:0.922, y0:0.098, y1:0.908},
    'assets/brush-08.png': {x0:0.009, x1:0.901, y0:0.039, y1:0.984},
    'assets/brush-09.png': {x0:0.055, x1:0.942, y0:0.163, y1:0.876},
    'assets/brush-10.png': {x0:0.044, x1:0.929, y0:0.035, y1:0.855},
  };

  // Calcule un background-size / background-position en px tels que la zone
  // encree (BRUSH_INK_BOUNDS) recouvre exactement le texte (contentW x
  // contentH), sans deborder sur le padding autour. Contrairement a un
  // recadrage en %, qui etire l'encre pour remplir toute la boite (texte +
  // padding) et donne des brushs coupees net sur les bords, ici le padding
  // affiche la vraie continuite de l'image (son degrade naturel) au lieu
  // d'un bout d'encre etire - donc un debut/fin de trait qui s'estompe au
  // lieu d'etre tranche, tout en garantissant zero vide sous le texte.
  function brushBackgroundStyle(imgPath, contentW, contentH, padX, padY){
    const b = BRUSH_INK_BOUNDS[imgPath];
    const boxW = contentW + padX * 2, boxH = contentH + padY * 2;
    if(!b) return { size:`${boxW}px ${boxH}px`, position:'0px 0px' };
    const wFrac = b.x1 - b.x0, hFrac = b.y1 - b.y0;
    const scaledW = contentW / wFrac, scaledH = contentH / hFrac;
    const posX = padX - b.x0 * scaledW, posY = padY - b.y0 * scaledH;
    return { size: `${scaledW.toFixed(2)}px ${scaledH.toFixed(2)}px`, position: `${posX.toFixed(2)}px ${posY.toFixed(2)}px` };
  }

  function applyBrushImage(brushEl, imgPath, contentW, contentH, padX, padY){
    const { size, position } = brushBackgroundStyle(imgPath, contentW, contentH, padX, padY);
    brushEl.style.backgroundImage = `url('${imgPath}')`;
    brushEl.style.backgroundSize = size;
    brushEl.style.backgroundPosition = position;
  }

  function waitForImages(container){
    const imgs = Array.from(container.querySelectorAll('img'));
    if(imgs.length === 0) return Promise.resolve();
    return Promise.all(imgs.map(img => img.complete ? Promise.resolve() : new Promise(res => {
      img.addEventListener('load', res, {once:true});
      img.addEventListener('error', res, {once:true});
    })));
  }

  // Pose une brush aleatoire sur lineWrap, cadree sur rect (coordonnees
  // viewport, ex. depuis getBoundingClientRect/getClientRects).
  function paintBrush(lineWrap, rect, delaySec){
    const wrapRect = lineWrap.getBoundingClientRect();
    const brush = document.createElement('div');
    brush.className = 'brush';
    applyBrushImage(brush, randomBrushImage(), rect.width, rect.height, BRUSH_PAD_X, BRUSH_PAD_Y);
    brush.style.left   = (rect.left - wrapRect.left - BRUSH_PAD_X) + 'px';
    brush.style.top    = (rect.top - wrapRect.top - BRUSH_PAD_Y) + 'px';
    brush.style.width  = (rect.width + BRUSH_PAD_X * 2) + 'px';
    brush.style.height = (rect.height + BRUSH_PAD_Y * 2) + 'px';
    brush.style.right  = 'auto';
    brush.style.bottom = 'auto';
    brush.style.animationDelay = delaySec + 's';
    lineWrap.insertBefore(brush, lineWrap.firstChild);
  }

  // Decoupe le texte rendu en ses lignes visuelles reelles (via Range.getClientRects)
  // et pose une brush independante, aleatoire, sur chacune.
  function paintTextBrushes(lineWrap, textEl){
    const range = document.createRange();
    range.selectNodeContents(textEl);
    const rects = Array.from(range.getClientRects());
    rects.forEach((r, i) => paintBrush(lineWrap, r, 0.3 + i * 0.08));
  }

  // Le pseudo (badges + nom) ne wrap jamais (flex nowrap) : une seule brush
  // cadree sur le bloc entier suffit.
  function paintNameBrush(lineWrap, contentEl){
    paintBrush(lineWrap, contentEl.getBoundingClientRect(), 0);
  }

  // Attend que les images (emotes / badges) soient chargees pour ne pas
  // mesurer un bloc qui va encore bouger (getClientRects force un reflow
  // synchrone, pas besoin d'attendre une frame de rendu).
  function scheduleBrushes(lineWrap, measureEl, paintFn){
    waitForImages(measureEl).then(() => paintFn(lineWrap, measureEl));
  }

  function addMessage(tags, message){
    try{
      const el = document.createElement('div');
      const side = (messageIndex++ % 2 === 0) ? 'side-left' : 'side-right';
      el.className = 'msg ' + side;

      const displayName = tags['display-name'] || tags.username;
      const username = tags.username || displayName;

      el.innerHTML = `
        <div class="msg-body">
          <div class="line-wrap name-line">
            <div class="avatar"></div>
            <div class="msg-content">
              ${renderBadges(tags)}
              <span class="username">${escapeHtml(displayName)}</span>
            </div>
          </div>
          <div class="line-wrap text-line">
            <span class="text">${renderMessageText(message, tags)}</span>
          </div>
        </div>
      `;

      // Ajout + purge dans un seul withFlip : deux appels separes capturent
      // chacun leur propre avant/apres et lancent chacun leur propre double
      // rAF, et le nouveau message (ignore par le 1er appel puisqu'il
      // n'existait pas encore, mais capture par le 2nd) se retrouvait avec
      // deux animations de transform concurrentes qui le faisaient flickerer.
      withFlip(() => {
        root.appendChild(el);

        // Purge par hauteur reelle plutot que par simple nombre : la taille
        // de la source navigateur dans OBS est fixe, et un message qui wrap
        // sur plusieurs lignes prend bien plus de place qu'un message court.
        // MAX_MESSAGES reste un garde-fou secondaire (evite un DOM sans
        // limite si tous les messages sont tres courts).
        const maxHeight = window.innerHeight * 0.92;
        while(root.children.length > 1
          && (root.children.length > CONFIG.MAX_MESSAGES || root.scrollHeight > maxHeight)){
          root.removeChild(root.firstElementChild);
        }
      });

      // Une brush independante par ligne visuelle reelle (pas une seule
      // etiree sur tout le bloc) : evite que le texte deborde dans le
      // vide quand le message est long / wrap sur plusieurs lignes.
      scheduleBrushes(el.querySelector('.name-line'), el.querySelector('.msg-content'), paintNameBrush);
      scheduleBrushes(el.querySelector('.text-line'), el.querySelector('.text'), paintTextBrushes);

      // Avatar personnalise (asynchrone, Supabase) : remplace le fallback
      // fixe s'il existe, sinon on garde l'avatar affiche ci-dessus.
      resolveAvatar(username, el.querySelector('.avatar'));

      if(CONFIG.MESSAGE_LIFETIME_MS > 0){
        setTimeout(()=>{
          el.classList.add('leaving');
          setTimeout(()=> withFlip(() => el.remove()), 650);
        }, CONFIG.MESSAGE_LIFETIME_MS);
      }
    }catch(err){
      console.error('[chat-overlay] [ERREUR] erreur lors de l\'affichage du message :', err, tags, message);
    }
  }

  function withFlip(mutateFn){
    const msgs = Array.from(root.children);
    const firstRects = new Map();
    msgs.forEach(m => firstRects.set(m, m.getBoundingClientRect()));

    mutateFn();

    const remaining = Array.from(root.children);
    remaining.forEach((m, i) => {
      const isLast = (i === remaining.length - 1);
      const tag = isLast ? '[flip][DERNIER]' : '[flip]';
      const first = firstRects.get(m);
      if(!first){
        if(CONFIG.DEBUG) console.log(tag, 'element sans rect avant (nouveau) - ignore');
        return;
      }
      const last = m.getBoundingClientRect();
      const deltaY = first.top - last.top;
      if(CONFIG.DEBUG) console.log(tag, 'top avant=', first.top.toFixed(1), 'top apres=', last.top.toFixed(1), 'deltaY=', deltaY.toFixed(1), 'transform actuel=', m.style.transform || '(aucun)');
      if(Math.abs(deltaY) < 0.5){
        if(CONFIG.DEBUG) console.log(tag, 'delta trop petit, ignore');
        return;
      }
      m.style.transition = 'none';
      m.style.transform = `translateY(${deltaY}px)`;
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          m.style.transition = 'transform 0.45s cubic-bezier(.4,0,.2,1)';
          m.style.transform = '';
          if(CONFIG.DEBUG) console.log(tag, 'animation demarree');
        });
      });
    });
  }

  window.addEventListener('error', (e) => {
    console.error('[chat-overlay] [ERREUR] erreur JS globale :', e.message, e.filename+':'+e.lineno);
  });

  /* ================================================================
     CLIENT IRC TWITCH - implementation maison, sans dependance externe
     Protocole : wss://irc-ws.chat.twitch.tv (IRCv3 + tags Twitch)
     Doc : https://dev.twitch.tv/docs/irc/
     ================================================================ */

  function parseIrcTags(rawTags){
    const tags = {};
    rawTags.split(';').forEach(pair=>{
      const eq = pair.indexOf('=');
      if(eq === -1) return;
      const key = pair.slice(0, eq);
      let val = pair.slice(eq+1);
      // unescape IRCv3 tag values
      val = val.replace(/\\s/g,' ').replace(/\\:/g,';').replace(/\\\\/g,'\\').replace(/\\r/g,'\r').replace(/\\n/g,'\n');
      tags[key] = val;
    });
    return tags;
  }

  function parseBadges(raw){
    const out = {};
    if(!raw) return out;
    raw.split(',').forEach(b=>{
      const [set, ver] = b.split('/');
      if(set) out[set] = ver;
    });
    return out;
  }

  function parseEmotes(raw){
    // format: "emoteId:start-end,start-end/emoteId2:start-end"
    const out = {};
    if(!raw) return out;
    raw.split('/').forEach(group=>{
      const [id, ranges] = group.split(':');
      if(!id || !ranges) return;
      out[id] = ranges.split(',');
    });
    return out;
  }

  function parseIrcLine(line){
    if(!line) return null;
    let rest = line;
    let tags = {};

    if(rest.startsWith('@')){
      const sp = rest.indexOf(' ');
      tags = parseIrcTags(rest.slice(1, sp));
      rest = rest.slice(sp+1);
    }

    let prefix = '';
    if(rest.startsWith(':')){
      const sp = rest.indexOf(' ');
      prefix = rest.slice(1, sp);
      rest = rest.slice(sp+1);
    }

    const sp = rest.indexOf(' ');
    const command = sp === -1 ? rest : rest.slice(0, sp);
    rest = sp === -1 ? '' : rest.slice(sp+1);

    let trailing = '';
    const trailIdx = rest.indexOf(' :');
    let paramsStr;
    if(rest.startsWith(':')){
      trailing = rest.slice(1);
      paramsStr = '';
    } else if(trailIdx !== -1){
      paramsStr = rest.slice(0, trailIdx);
      trailing = rest.slice(trailIdx+2);
    } else {
      paramsStr = rest;
    }
    const params = paramsStr.length ? paramsStr.split(' ') : [];
    if(trailing || rest.includes(' :')) params.push(trailing);

    return { tags, prefix, command, params, trailing };
  }

  function connectTwitchIRC(channel, handlers){
    const NICK = 'justinfan' + Math.floor(10000 + Math.random()*89999);
    let ws;
    let pingInterval;

    function connect(){
      ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

      ws.onopen = () => {
        ws.send('CAP REQ :twitch.tv/tags twitch.tv/commands twitch.tv/membership');
        ws.send('PASS SCHMOOPIIE');
        ws.send('NICK ' + NICK);
        ws.send('JOIN #' + channel.toLowerCase());
      };

      ws.onmessage = (event) => {
        const lines = event.data.split('\r\n').filter(Boolean);
        lines.forEach(line => {
          if(CONFIG.DEBUG) console.log('[irc]', line);

          if(line.startsWith('PING')){
            ws.send('PONG :tmi.twitch.tv');
            return;
          }

          const msg = parseIrcLine(line);
          if(!msg) return;

          if(msg.command === '001' || msg.command === 'GLOBALUSERSTATE'){
            handlers.onConnected && handlers.onConnected();
          }

          if(msg.command === 'PRIVMSG'){
            const tags = msg.tags;
            const parsedTags = {
              'display-name': tags['display-name'] || (msg.prefix ? msg.prefix.split('!')[0] : 'inconnu'),
              username: msg.prefix ? msg.prefix.split('!')[0] : 'inconnu',
              color: tags.color || '',
              badges: parseBadges(tags.badges),
              emotes: parseEmotes(tags.emotes),
            };
            const message = msg.params[msg.params.length-1] || '';
            handlers.onMessage && handlers.onMessage(parsedTags, message);
          }

          if(msg.command === 'NOTICE'){
            if(CONFIG.DEBUG) console.warn('[chat-overlay] NOTICE Twitch :', msg.trailing);
          }
        });
      };

      ws.onclose = () => {
        handlers.onDisconnected && handlers.onDisconnected();
        clearInterval(pingInterval);
        setTimeout(connect, 3000); // reconnexion auto
      };

      ws.onerror = (err) => {
        console.error('[chat-overlay] [ERREUR] erreur WebSocket :', err);
      };

      // keep-alive de secours (en plus des PING serveur)
      pingInterval = setInterval(() => {
        if(ws.readyState === WebSocket.OPEN) ws.send('PING :keepalive');
      }, 4 * 60 * 1000);
    }

    connect();
  }

  async function start(){
    if(CONFIG.DEBUG) console.log('[chat-overlay] chargement des badges...');
    await loadBadges();
    if(CONFIG.DEBUG) console.log('[chat-overlay] badges charges :', Object.keys(badgeMap).length);

    connectTwitchIRC(CONFIG.CHANNEL, {
      onConnected: () => {
        console.log('[chat-overlay] [OK] connecte - en ecoute sur #'+CONFIG.CHANNEL);
        if(CONFIG.DEBUG){
          addMessage({ 'display-name':'Overlay', color:'#c9a15a', badges:{} }, "connecte et en ecoute sur #"+CONFIG.CHANNEL+" - ce message de test disparait normalement a la reception d'un vrai message.");
        }
      },
      onDisconnected: () => {
        console.warn('[chat-overlay] [ATTENTION] deconnecte, reconnexion dans 3s...');
      },
      onMessage: (tags, message) => {
        if(CONFIG.DEBUG) console.log('[chat-overlay] message recu de', tags.username, ':', message);
        addMessage(tags, message);
      },
    });
  }

  start();

})();
</script>
