<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Overlay coffre</title>
<style>
  :root{
    --fg: #e6e6e6;
    --muted: #999999;
    --accent: #f2c14e;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0;
    width:100%; height:100%;
    background:transparent;
    color:var(--fg);
    font-family:'Segoe UI', sans-serif;
    overflow:hidden;
  }

  .stage{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    pointer-events:none;
  }

  /* ---------------------------- Coffre (sprites Seliel the Shaper) ---------------------------- */
  .chest-wrap{
    position:relative;
    width:192px; height:192px;
    opacity:0;
    transform:scale(0.9);
    transition:opacity 0.3s ease, transform 0.3s ease;
  }
  .chest-wrap.visible{ opacity:1; transform:scale(1); }

  .chest-sprite{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:contain;
    image-rendering:pixelated;
  }
  .chest-sprite-open{ opacity:0; transition:opacity 0.4s ease; }
  .chest-wrap.bursting .chest-sprite-closed{ opacity:0; transition:opacity 0.4s ease; }
  .chest-wrap.bursting .chest-sprite-open{ opacity:1; }

  /* Coffre visible mais pas encore ouvert : un evenement est en attente
     que le streamer clique "Ouvrir le coffre" dans chest-control.html. */
  .chest-wrap.idle-bob{ animation: idle-bob 2.4s ease-in-out infinite; }
  @keyframes idle-bob{
    0%, 100%{ transform: translateY(0); }
    50%{ transform: translateY(-6px); }
  }

  .chest-wrap.shaking{ animation: chest-shake 0.12s infinite; }
  @keyframes chest-shake{
    0%{ transform: translateX(0) rotate(0); }
    25%{ transform: translateX(-4px) rotate(-1.5deg); }
    50%{ transform: translateX(3px) rotate(1deg); }
    75%{ transform: translateX(-3px) rotate(-1deg); }
    100%{ transform: translateX(0) rotate(0); }
  }

  /* Pas de sprite de fissure dans le pack (seulement ferme/ouvert) : la
     montee en tension se joue via des a-coups + flashs successifs. */
  .chest-wrap.pulse{ animation: chest-pulse 0.35s ease; }
  @keyframes chest-pulse{
    0%{ transform:scale(1); }
    50%{ transform:scale(1.12) rotate(-2deg); }
    100%{ transform:scale(1); }
  }
  .impact-flash{
    position:absolute; left:50%; top:45%;
    width:140px; height:140px;
    transform:translate(-50%,-50%);
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,240,200,0.9), rgba(242,193,78,0) 70%);
    opacity:0;
    pointer-events:none;
  }
  .impact-flash.flash{ animation: impact-flash-anim 0.35s ease-out; }
  @keyframes impact-flash-anim{
    0%{ opacity:0.9; transform:translate(-50%,-50%) scale(0.6); }
    100%{ opacity:0; transform:translate(-50%,-50%) scale(1.4); }
  }

  .burst{
    position:absolute; left:50%; top:45%;
    width:10px; height:10px;
    transform:translate(-50%,-50%);
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,240,200,0.95), rgba(242,193,78,0) 70%);
    opacity:0;
    pointer-events:none;
  }
  .chest-wrap.bursting .burst{
    animation: burst-pop 0.7s ease-out forwards;
  }
  @keyframes burst-pop{
    0%{ width:10px; height:10px; opacity:1; }
    100%{ width:420px; height:420px; opacity:0; }
  }

  /* ---------------------------- Feu d'artifice (flipbook 8 frames) ---------------------------- */
  .firework{
    position:absolute; left:50%; top:38%;
    width:160px; height:160px;
    transform:translate(-50%,-50%);
    image-rendering:pixelated;
    object-fit:contain;
    opacity:0;
    pointer-events:none;
  }
  .firework.playing{ opacity:1; }

  /* ---------------------------- Jaillissement d'items (coffre ouvert) ---------------------------- */
  /* Rayons de lumiere + items qui montent depuis le coffre, façon "chest opening"
     Vampire Survivors - remplace l'ancienne machine a sous encadree. */
  .burst-wrap{
    position:absolute; inset:0;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.3s ease;
  }
  .burst-wrap.visible{ opacity:1; }

  .ray{
    position:absolute; left:50%; bottom:18%;
    width:160px; height:62vh;
    transform-origin:50% 100%;
    clip-path: polygon(46% 100%, 54% 100%, 100% 0%, 0% 0%);
    filter:blur(1px);
    animation: ray-pulse 1.4s ease-in-out infinite;
  }
  .ray-0{ transform: translateX(-50%) rotate(-26deg); background:linear-gradient(0deg, rgba(255,130,60,0.55), rgba(255,130,60,0)); }
  .ray-1{ transform: translateX(-50%) rotate(0deg); background:linear-gradient(0deg, rgba(255,80,80,0.6), rgba(255,80,80,0)); animation-delay:0.2s; }
  .ray-2{ transform: translateX(-50%) rotate(26deg); background:linear-gradient(0deg, rgba(255,130,60,0.55), rgba(255,130,60,0)); animation-delay:0.4s; }
  @keyframes ray-pulse{
    0%, 100%{ opacity:0.35; }
    50%{ opacity:0.65; }
  }

  .floating-icon{
    position:absolute; left:50%; bottom:18%;
    width:28px; height:28px;
    transform:translate(-50%, 0);
    animation: float-up 1.4s ease-out forwards;
  }
  @keyframes float-up{
    0%{ transform:translate(-50%, 0) scale(0.8); opacity:0; }
    15%{ opacity:1; }
    100%{ transform:translate(calc(-50% + var(--drift, 0px)), -60vh) scale(1); opacity:0; }
  }

  .result-icon{
    position:absolute; left:50%; bottom:18%;
    width:64px; height:64px;
    transform:translate(-50%, 0);
    opacity:0;
  }
  .result-icon.rising{
    animation: result-rise 1.1s cubic-bezier(.2,.8,.2,1) forwards;
  }
  @keyframes result-rise{
    0%{ transform:translate(-50%, 0) scale(0.6); opacity:0; filter:drop-shadow(0 0 0 rgba(242,193,78,0)); }
    20%{ opacity:1; }
    100%{ transform:translate(-50%, -180px) scale(1.4); opacity:1; filter:drop-shadow(0 0 18px rgba(242,193,78,0.9)); }
  }

  /* ---------------------------- Carte de recompense (fallback sans video) ---------------------------- */
  .reward-card{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    opacity:0;
    transition:opacity 0.4s ease;
    pointer-events:none;
  }
  .reward-card.visible{ opacity:1; }
  .reward-card-inner{
    text-align:center;
    background:#111111;
    border:2px solid var(--accent);
    border-radius:16px;
    padding:28px 40px;
    box-shadow:0 0 30px rgba(242,193,78,0.35);
  }
  .reward-card-icon{ width:56px; height:56px; margin-bottom:8px; }
  .reward-card-tier{
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--accent);
    font-weight:700;
    font-size:14px;
    margin-bottom:4px;
  }
  .reward-card-login{ font-size:20px; font-weight:600; }

  .reward-video{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:contain;
    opacity:0;
    transition:opacity 0.4s ease;
  }
  .reward-video.visible{ opacity:1; }

  /* ---------------------------- Panneau de test (?debug=1 uniquement) ---------------------------- */
  .debug-panel{
    display:none;
    position:fixed; left:12px; top:12px;
    z-index:10;
    background:rgba(17,17,17,0.9);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:10px;
    padding:10px;
    gap:6px;
    pointer-events:auto;
  }
  .debug-panel.visible{ display:flex; }
  .debug-panel button{
    font-family:inherit;
    font-size:12px;
    font-weight:600;
    color:#000;
    background:var(--accent);
    border:none;
    border-radius:6px;
    padding:6px 10px;
    cursor:pointer;
  }
  .debug-panel button:hover{ filter:brightness(0.9); }
</style>
</head>
<body>

<div class="debug-panel" id="debug-panel">
  <button data-test="follow">Test follow</button>
  <button data-test="sub:1000">Test sub T1</button>
  <button data-test="sub:2000">Test sub T2</button>
  <button data-test="sub:3000">Test sub T3</button>
  <button id="debug-close-btn">Fermer le coffre</button>
</div>

<div class="stage">
  <div class="chest-wrap" id="chest-wrap">
    <div class="impact-flash" id="impact-flash"></div>
    <div class="burst"></div>
    <img class="chest-sprite chest-sprite-closed" id="chest-sprite-closed" alt="">
    <img class="chest-sprite chest-sprite-open" id="chest-sprite-open" alt="">
  </div>

  <img class="firework" id="firework" alt="">

  <div class="burst-wrap" id="burst-wrap">
    <div class="ray ray-0"></div>
    <div class="ray ray-1"></div>
    <div class="ray ray-2"></div>
    <img class="result-icon" id="result-icon" alt="">
  </div>

  <div class="reward-card" id="reward-card">
    <div class="reward-card-inner">
      <img class="reward-card-icon" id="reward-card-icon" alt="">
      <div class="reward-card-tier" id="reward-card-tier">Epique</div>
      <div class="reward-card-login" id="reward-card-login">pseudo</div>
    </div>
  </div>

  <video class="reward-video" id="reward-video" muted playsinline></video>
</div>

<script src="assets/chest-manifest.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(function(){

  /* ====================== CONFIG A REMPLIR ====================== */
  const CONFIG = {
    SUPABASE_URL: 'https://nvqddjwfzuusvmfwilyh.supabase.co',
    SUPABASE_ANON_KEY: 'sb_publishable_z9m2o_qjOP5Evrn_sR8uOw_vgeSIywz',
    // Sons optionnels : si absents/404, le flux visuel continue avec des
    // delais de secours (voir playTrack). A deposer dans assets/chest/audio/.
    AUDIO: {
      waiting: 'assets/chest/audio/waiting.mp3',
      opening: 'assets/chest/audio/opening.mp3',
      ongoing: {
        commun: 'assets/chest/audio/ongoing-commun.mp3',
        rare: 'assets/chest/audio/ongoing-rare.mp3',
        epique: 'assets/chest/audio/ongoing-epique.mp3',
      },
      ending: {
        commun: 'assets/chest/audio/ending-commun.mp3',
        rare: 'assets/chest/audio/ending-rare.mp3',
        epique: 'assets/chest/audio/ending-epique.mp3',
      },
    },
  };
  /* ================================================================ */

  const manifest = window.CHEST_MANIFEST;
  const sb = (CONFIG.SUPABASE_URL !== 'REMPLACE_MOI')
    ? window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY)
    : null;

  const chestWrap = document.getElementById('chest-wrap');
  const chestSpriteClosed = document.getElementById('chest-sprite-closed');
  const chestSpriteOpen = document.getElementById('chest-sprite-open');
  const impactFlash = document.getElementById('impact-flash');
  const firework = document.getElementById('firework');
  const burstWrap = document.getElementById('burst-wrap');
  const resultIcon = document.getElementById('result-icon');
  const rewardCard = document.getElementById('reward-card');
  const rewardCardIcon = document.getElementById('reward-card-icon');
  const rewardCardTier = document.getElementById('reward-card-tier');
  const rewardCardLogin = document.getElementById('reward-card-login');
  const rewardVideo = document.getElementById('reward-video');

  const sleep = (ms) => new Promise(r => setTimeout(r, ms));

  function normalizeReward(rt){
    return manifest.rewardOrder.includes(rt) ? rt : 'commun';
  }

  // ---------------------------- Autoplay bloque par le navigateur ----------------------------

  // Un navigateur normal (teste en dehors d'OBS, ex. onglet Chrome ouvert
  // directement sur cette page) refuse l'autoplay avec son tant qu'aucune
  // interaction n'a eu lieu sur la page - ce qui arrive typiquement quand la
  // page se charge alors qu'un coffre est deja en file : le premier
  // audio.play() (boucle d'attente) est rejete silencieusement, sans son ni
  // erreur visible. Des qu'une interaction survient (clic, touche...), on
  // retente la lecture de tout ce qui est encore en pause. Dans OBS (source
  // navigateur), l'autoplay avec son est autorise par defaut : ce mecanisme
  // ne sert alors a rien mais ne genera pas non plus.
  const activeAudios = new Set();
  let autoplayUnlockArmed = false;

  function armAutoplayUnlock(){
    if(autoplayUnlockArmed) return;
    autoplayUnlockArmed = true;
    const retryAll = () => {
      activeAudios.forEach((audio) => {
        if(audio.paused && !audio.ended) audio.play().catch(() => {});
      });
    };
    document.addEventListener('pointerdown', retryAll, { passive: true });
    document.addEventListener('keydown', retryAll);
  }

  function attemptPlay(audio){
    activeAudios.add(audio);
    audio.addEventListener('ended', () => activeAudios.delete(audio), { once: true });
    armAutoplayUnlock();
    audio.play().catch((err) => {
      console.warn('[chest-overlay] lecture audio bloquee (autoplay) - sera retentee a la premiere interaction sur la page:', err);
    });
  }

  // A appeler chaque fois qu'on met en pause une piste volontairement (elle
  // ne doit pas etre relancee plus tard par le mecanisme de deblocage
  // autoplay au prochain clic).
  function forgetAudio(audio){
    activeAudios.delete(audio);
  }

  // Meme prechargee, une piste a toujours un petit delai de demarrage reel
  // au moment du .play() (quelques dizaines de ms, incompressible). Pour que
  // la coupure soit imperceptible, la piste suivante demarre volontairement
  // un peu AVANT la fin reelle de la precedente plutot qu'exactement a la
  // fin : les deux se chevauchent legerement le temps que la nouvelle piste
  // soit vraiment audible, au lieu de laisser un blanc.
  //
  // Ajustable en direct depuis le panneau "Reglages audio" de
  // chest-control.html (table chest_settings, voir loadSettings/
  // subscribeSettingsRealtime plus bas) - ces valeurs par defaut ne servent
  // que tant que Supabase n'est pas configure ou pas encore charge.
  const SETTINGS = {
    waitingLoopOverlapMs: 200,
    openingOngoingOverlapMs: 200,
    ongoingEndingOverlapMs: 200,
  };

  function applySettings(row){
    if(!row) return;
    if(Number.isFinite(row.waiting_loop_overlap_ms)) SETTINGS.waitingLoopOverlapMs = row.waiting_loop_overlap_ms;
    if(Number.isFinite(row.opening_ongoing_overlap_ms)) SETTINGS.openingOngoingOverlapMs = row.opening_ongoing_overlap_ms;
    if(Number.isFinite(row.ongoing_ending_overlap_ms)) SETTINGS.ongoingEndingOverlapMs = row.ongoing_ending_overlap_ms;
  }

  async function loadSettings(){
    if(!sb) return;
    const { data, error } = await sb.from('chest_settings').select('*').eq('id', 1).maybeSingle();
    if(error){ console.error('[chest-overlay] chargement reglages:', error); return; }
    applySettings(data);
  }

  function subscribeSettingsRealtime(){
    if(!sb) return;
    sb.channel('chest_settings_overlay')
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'chest_settings' }, (payload) => {
        applySettings(payload.new);
      })
      .subscribe();
  }

  // Cree l'element audio et lance son chargement tout de suite, sans le
  // jouer - a appeler en avance (pendant qu'une phase precedente joue
  // encore) pour que le fichier soit deja pret au moment de playTrack().
  // Sans ca, le fetch/decodage du fichier demarre seulement quand on appelle
  // .play(), ce qui cree un blanc audible a chaque transition.
  function preloadTrack(src){
    const audio = new Audio(src);
    audio.preload = 'auto';
    audio.load();
    return audio;
  }

  // Joue une piste et fournit une promesse qui se resout legerement AVANT
  // la fin reelle (voir `overlapMs`) - sert d'horloge maitresse pour
  // enchainer la phase suivante en chevauchement plutot qu'avec un blanc.
  // `fallbackMs` n'est qu'un filet de securite si le fichier est absent/404
  // ou l'autoplay bloque - des que sa vraie duree est connue, le delai se
  // recalcule dessus.
  function playTrack(srcOrAudio, { loop = false, fallbackMs = 8000, overlapMs = 200 } = {}){
    const audio = (srcOrAudio instanceof HTMLAudioElement) ? srcOrAudio : new Audio(srcOrAudio);
    audio.loop = loop;
    let done = null;
    if(!loop){
      done = new Promise((resolve) => {
        let settled = false;
        let timer = null;
        const finish = () => {
          if(settled) return;
          settled = true;
          if(timer) clearTimeout(timer);
          resolve();
        };
        const arm = (ms) => { if(timer) clearTimeout(timer); timer = setTimeout(finish, Math.max(0, ms)); };
        const armFromDuration = () => arm(audio.duration * 1000 - overlapMs);
        arm(fallbackMs);
        // Si la piste a ete prechargee (preloadTrack), les metadonnees sont
        // deja chargees a ce stade et l'evenement 'loadedmetadata' ne se
        // redeclenchera pas - il faut donc aussi verifier l'etat courant,
        // pas seulement ecouter l'evenement.
        if(audio.readyState >= HTMLMediaElement.HAVE_METADATA && isFinite(audio.duration) && audio.duration > 0){
          armFromDuration();
        }else{
          audio.addEventListener('loadedmetadata', () => {
            if(isFinite(audio.duration)) armFromDuration();
          });
        }
        // Filet de secours si jamais le chevauchement volontaire ne se
        // declenchait pas (duree inconnue) : la vraie fin de piste reste un
        // deuxieme point de sortie possible.
        audio.addEventListener('ended', finish, { once: true });
        audio.addEventListener('error', finish, { once: true });
      });
    }
    attemptPlay(audio);
    return { audio, done };
  }

  // ---------------------------- File d'attente (coffre visible avant ouverture) ----------------------------

  // Evenements 'pending' connus (deja crees par twitch-eventsub, pas encore
  // declenches par le streamer). Le premier de la liste est celui affiche a
  // l'ecran - c'est aussi toujours celui que open-chest declenchera en
  // premier (meme tri "plus ancien d'abord" cote serveur).
  let pendingList = [];
  let waitingController = null;
  let animating = false;

  // Boucle waiting.mp3 en s'auto-chevauchant (meme principe que le
  // chevauchement entre les phases) : audio.loop natif recree une toute
  // petite coupure a chaque tour (surtout en MP3), donc on gere le bouclage
  // nous-memes en prechargeant/demarrant le tour suivant un peu avant la fin
  // du tour courant.
  function startWaitingLoop(src){
    let stopRequested = false;
    let hardStopped = false;
    let resolveStopped = null;
    const stopped = new Promise((resolve) => { resolveStopped = resolve; });
    let currentAudio = null;

    function playSegment(){
      if(hardStopped) return;
      const audio = preloadTrack(src);
      currentAudio = audio;
      attemptPlay(audio);

      const armNext = () => {
        if(hardStopped) return;
        const ms = Math.max(0, (audio.duration * 1000) - SETTINGS.waitingLoopOverlapMs);
        setTimeout(() => {
          if(hardStopped) return;
          if(stopRequested){ resolveStopped(); return; }
          playSegment();
        }, ms);
      };
      if(audio.readyState >= HTMLMediaElement.HAVE_METADATA && isFinite(audio.duration) && audio.duration > 0){
        armNext();
      }else{
        audio.addEventListener('loadedmetadata', armNext, { once: true });
      }
    }

    playSegment();

    return {
      // Termine le tour de boucle en cours (pas de coupure en plein milieu)
      // puis se resout - a utiliser quand le streamer declenche l'ouverture.
      requestStop(){ stopRequested = true; return stopped; },
      // Coupe immediatement, sans attendre la fin du tour (ex. l'evenement
      // disparait de la file sans jamais avoir ete declenche).
      stop(){
        hardStopped = true;
        stopRequested = true;
        if(currentAudio){ currentAudio.pause(); forgetAudio(currentAudio); }
        resolveStopped();
      },
    };
  }

  function showWaitingChest(ev){
    const reward = normalizeReward(ev.reward_type);
    chestSpriteClosed.src = manifest.chestImage(reward, 'closed');
    chestSpriteOpen.src = manifest.chestImage(reward, 'open');
    chestWrap.classList.remove('bursting');
    chestWrap.classList.add('visible', 'idle-bob');
    if(!waitingController){
      waitingController = startWaitingLoop(CONFIG.AUDIO.waiting);
    }
  }

  function hideChest(){
    chestWrap.classList.remove('visible', 'idle-bob', 'bursting');
    if(waitingController){ waitingController.stop(); waitingController = null; }
  }

  // Rafraichit l'affichage "en attente" d'apres pendingList - jamais pendant
  // qu'une ouverture est deja en cours (l'animation gere elle-meme sa suite).
  function refreshWaitingDisplay(){
    if(animating) return;
    if(pendingList.length > 0) showWaitingChest(pendingList[0]);
    else hideChest();
  }

  // Le coffre ouvert + la recompense restent affiches indefiniment apres la
  // phase de revelation, jusqu'a ce que le streamer clique "Fermer le
  // coffre" sur chest-control.html (ou le bouton du panneau ?debug=1). Une
  // seule ouverture est jamais affichee a la fois (traitement sequentiel de
  // la file), donc un seul resolveur actif suffit.
  let activeCloseResolve = null;

  function waitForClose(){
    return new Promise((resolve) => { activeCloseResolve = resolve; });
  }

  function forceClose(){
    if(activeCloseResolve){
      const resolve = activeCloseResolve;
      activeCloseResolve = null;
      resolve();
    }
  }

  const queue = [];
  let processing = false;

  function enqueueEvent(ev){
    queue.push(ev);
    processQueue();
  }

  async function processQueue(){
    if(processing) return;
    processing = true;
    animating = true;
    while(queue.length > 0){
      const ev = queue.shift();
      pendingList = pendingList.filter((p) => p.id !== ev.id);
      try{
        await playChestSequence(ev);
      }catch(err){
        console.error('[chest-overlay] erreur pendant l\'animation:', err);
      }
    }
    animating = false;
    processing = false;
    refreshWaitingDisplay(); // enchaine sur le prochain coffre en attente, s'il y en a un
  }

  async function playChestSequence(ev){
    const reward = normalizeReward(ev.reward_type);

    // Le coffre est normalement deja visible depuis l'etat d'attente ; on
    // s'assure juste que le bon sprite est en place (utile si l'overlay a
    // rechargé sans etre passe par cet etat, ex. mode ?simulate=/?debug=1).
    chestSpriteClosed.src = manifest.chestImage(reward, 'closed');
    chestSpriteOpen.src = manifest.chestImage(reward, 'open');
    chestWrap.classList.remove('bursting', 'idle-bob');
    chestWrap.classList.add('visible');

    // Precharge les 3 pistes tout de suite (pendant que la boucle d'attente
    // termine son tour) : chacune a ainsi toute la duree necessaire pour
    // finir de charger, et playTrack() n'a plus qu'a appeler .play() sur un
    // fichier deja pret (plus de blanc du au fetch/decodage a chaque
    // transition).
    const openingAudio = preloadTrack(CONFIG.AUDIO.opening);
    const ongoingAudio = preloadTrack(CONFIG.AUDIO.ongoing[reward]);
    const endingAudio = preloadTrack(CONFIG.AUDIO.ending[reward]);

    // Laisse le tour de boucle "en attente" en cours se terminer
    // naturellement (pas de coupure en plein milieu) avant d'enchainer sur
    // l'ouverture - le chevauchement de fin de tour masque la transition.
    if(waitingController){
      await waitingController.requestStop();
      waitingController = null;
    }

    await playOpening(openingAudio);
    await playOngoing(ongoingAudio);
    await playEnding(ev, reward, endingAudio);

    chestWrap.classList.remove('visible', 'bursting');
  }

  // --- Phase 1 : montee en tension + explosion, calee sur opening.mp3 ---
  async function playOpening(preloadedAudio){
    const { done } = playTrack(preloadedAudio, { fallbackMs: 6500, overlapMs: SETTINGS.openingOngoingOverlapMs });

    chestWrap.classList.add('shaking');
    await sleep(900);
    chestWrap.classList.remove('shaking');

    // Pas de sprite de fissure dans le pack (juste ferme/ouvert) : la tension
    // se joue en a-coups + flashs qui s'enchainent jusqu'a la fin du morceau.
    let trackEnded = false;
    done.then(() => { trackEnded = true; });
    while(!trackEnded){
      chestWrap.classList.remove('pulse');
      impactFlash.classList.remove('flash');
      void chestWrap.offsetWidth; // relance les animations CSS
      chestWrap.classList.add('pulse');
      impactFlash.classList.add('flash');
      await sleep(450);
    }

    chestWrap.classList.add('bursting'); // crossfade sprite ferme -> ouvert (se termine en parallele de la suite)
  }

  // --- Phase 2 : jaillissement decoratif d'items, cale sur ongoing-<palier>.mp3 ---
  async function playOngoing(preloadedAudio){
    burstWrap.classList.add('visible');
    const { done } = playTrack(preloadedAudio, { overlapMs: SETTINGS.ongoingEndingOverlapMs });
    const spawnTimer = setInterval(spawnFloatingIcon, 140);
    await done;
    clearInterval(spawnTimer);
  }

  // --- Phase 3 : revelation de la vraie recompense, calee sur ending-<palier>.mp3 ---
  async function playEnding(ev, reward, preloadedAudio){
    const { audio, done } = playTrack(preloadedAudio, { overlapMs: SETTINGS.ongoingEndingOverlapMs });

    playFirework();
    resultIcon.classList.remove('rising');
    void resultIcon.offsetWidth; // relance l'animation CSS
    resultIcon.src = manifest.rewardIcon[reward];
    resultIcon.classList.add('rising');

    const videoPath = manifest.randomVideoPath(reward);
    let usedVideo = false;
    if(videoPath){
      audio.pause(); forgetAudio(audio); // la cinematique a son propre son
      usedVideo = await tryPlayRewardVideo(videoPath);
    }else{
      rewardCardIcon.src = manifest.rewardIcon[reward];
      rewardCardTier.textContent = manifest.rewardLabels[reward] || reward;
      rewardCardLogin.textContent = ev.twitch_login;
      rewardCard.classList.add('visible');
      await done;
    }

    // Le coffre ouvert + la recompense restent affiches jusqu'a ce que le
    // streamer clique "Fermer le coffre" - voir waitForClose/forceClose.
    await waitForClose();

    rewardCard.classList.remove('visible');
    if(usedVideo){ rewardVideo.classList.remove('visible'); rewardVideo.removeAttribute('src'); }
    burstWrap.classList.remove('visible');
  }

  function spawnFloatingIcon(){
    const el = document.createElement('img');
    el.className = 'floating-icon';
    const pool = manifest.decorativeIcons;
    el.src = pool[Math.floor(Math.random() * pool.length)];
    el.style.setProperty('--drift', (Math.random() * 160 - 80) + 'px');
    el.style.left = (50 + (Math.random() * 20 - 10)) + '%';
    burstWrap.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }

  // Flipbook 8 frames joue une fois en fond au moment de la revelation.
  function playFirework(){
    const frames = manifest.fireworkFrames;
    firework.classList.add('playing');
    let i = 0;
    const timer = setInterval(() => {
      firework.src = frames[i];
      i++;
      if(i >= frames.length){
        clearInterval(timer);
        firework.classList.remove('playing');
      }
    }, 70);
  }

  // Se resout quand la video se termine (ou echoue) mais NE la masque pas :
  // elle reste affichee (figee sur la derniere image) jusqu'a la fermeture
  // manuelle du coffre - voir playEnding/waitForClose.
  function tryPlayRewardVideo(src){
    return new Promise((resolve) => {
      rewardVideo.src = src;
      const onEnded = () => cleanup(true);
      const onError = () => cleanup(false);
      function cleanup(ok){
        rewardVideo.removeEventListener('ended', onEnded);
        rewardVideo.removeEventListener('error', onError);
        resolve(ok);
      }
      rewardVideo.addEventListener('ended', onEnded);
      rewardVideo.addEventListener('error', onError);
      rewardVideo.play().then(() => {
        rewardVideo.classList.add('visible');
      }).catch(() => cleanup(false));
    });
  }

  // ---------------------------- Entree des evenements ----------------------------

  // Resultat pre-determine par le serveur (Edge Function twitch-eventsub) :
  // ce mapping n'existe ici QUE pour les tests locaux (?simulate= et panneau
  // ?debug=1), jamais pour un vrai evenement (toujours ev.reward_type venant
  // de Supabase).
  const TEST_REWARD_BY_TIER = { '1000': 'rare', '2000': 'epique', '3000': 'epique' };

  function buildTestEvent(kind){
    if(kind === 'follow'){
      return { twitch_login: 'ViewerTest', event_type: 'follow', tier: null, reward_type: 'commun' };
    }
    const match = /^sub:(\d{4})$/.exec(kind || '');
    if(match){
      const tier = match[1];
      return { twitch_login: 'ViewerTest', event_type: 'subscribe', tier, reward_type: TEST_REWARD_BY_TIER[tier] || 'rare' };
    }
    return null;
  }

  async function loadInitialPending(){
    if(!sb) return;
    const { data, error } = await sb
      .from('chest_events')
      .select('*')
      .eq('status', 'pending')
      .order('created_at', { ascending: true });
    if(error){ console.error('[chest-overlay] chargement de la file:', error); return; }
    pendingList = data || [];
    refreshWaitingDisplay();
  }

  function subscribeRealtime(){
    if(!sb) return;
    sb.channel('chest_events_overlay')
      // Nouvel evenement follow/sub : le coffre apparait et attend que le
      // streamer l'ouvre depuis chest-control.html.
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chest_events' }, (payload) => {
        pendingList.push(payload.new);
        refreshWaitingDisplay();
      })
      // Le streamer a clique "Ouvrir le coffre" : on lance l'animation.
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'chest_events', filter: 'status=eq.triggered' }, (payload) => {
        pendingList = pendingList.filter((p) => p.id !== payload.new.id);
        enqueueEvent(payload.new);
      })
      // Le streamer a clique "Fermer le coffre" : on masque le coffre/la
      // recompense actuellement affiches et on enchaine sur la suite.
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'chest_events', filter: 'status=eq.consumed' }, () => {
        forceClose();
      })
      .subscribe();
  }

  // Panneau visible uniquement sur chest-overlay.html?debug=1 (jamais dans
  // OBS en usage normal) : boutons pour rejouer l'animation sans backend, a
  // volonte, pendant qu'on regle les timings/assets.
  function initDebugPanel(){
    const panel = document.getElementById('debug-panel');
    panel.classList.add('visible');
    panel.querySelectorAll('button[data-test]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const testEvent = buildTestEvent(btn.dataset.test);
        if(testEvent) enqueueEvent(testEvent);
      });
    });
    document.getElementById('debug-close-btn').addEventListener('click', forceClose);
  }

  async function init(){
    const params = new URLSearchParams(location.search);

    if(params.get('debug') === '1'){
      initDebugPanel();
    }

    const simulated = buildTestEvent(params.get('simulate'));
    if(simulated){
      enqueueEvent(simulated);
      return; // mode test : pas de connexion Supabase necessaire.
    }

    await loadSettings();
    subscribeSettingsRealtime();
    await loadInitialPending(); // coffres deja en attente (ex. reload OBS en cours de stream)
    subscribeRealtime();
  }

  init();

})();
</script>
